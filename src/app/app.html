@if (!isLoading()) {
  <app-navbar></app-navbar>
  <router-outlet></router-outlet>
  <app-footer></app-footer>
} @else if (offline()) {
  <app-internet-connection></app-internet-connection>
} @else if (error()) {
  <div
    class="flex justify-center items-center p-4 my-4 text-sm text-fg-danger-strong rounded-base bg-danger-soft"
    role="alert"
  >
    <svg
      class="w-3 h-3 sm:w-4 sm:h-4 me-2 shrink-0"
      aria-hidden="true"
      xmlns="http://www.w3.org/2000/svg"
      width="24"
      height="24"
      fill="none"
      viewBox="0 0 24 24"
    >
      <path
        stroke="currentColor"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M10 11h2v5m-2 0h4m-2.592-8.5h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
      />
    </svg>
    <p class="text-2xs sm:text-sm">Error in connection. Please try again.</p>
  </div>
}
<ngx-spinner
  bdColor="rgba(0, 0, 0, 0.8)"
  size="default"
  color="#fff"
  type="ball-clip-rotate"
  [fullScreen]="true"
  ><p style="color: white">Loading...</p></ngx-spinner
>
