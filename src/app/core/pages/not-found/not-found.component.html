<div

    </div>
    <div

      <i class="fa-carrot fa-solid"></i>
    </div>
    <div
      class="absolute bottom-[25%] left-[8%] text-green-200 text-3xl animate-[float_7s_ease-in-out_infinite_0.5s]"

    </div>
    <div

    </div>
    <div

  <div class="relative z-10 max-w-xl w-full">

            <div

            ></div>
            <i

          </div>
          <div class="absolute -top-2 -right-2 sm:top-0 sm:right-0">

    <div class="text-center mb-10">
      <h1 class="text-4xl sm:text-5xl font-black text-gray-900 mb-4 tracking-tight">

      <p class="text-gray-500 text-lg leading-relaxed max-w-md mx-auto">

        explore.
      </p>
    </div>
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-12">
      <a

        <i class="fa-solid fa-home group-hover:scale-110 transition-transform duration-300"></i>
        Go to Homepage</a
      ><button

        <i
          class="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform duration-300"

      </button>
