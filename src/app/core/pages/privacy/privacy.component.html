<div class="min-h-screen bg-gradient-to-b from-gray-50 to-white">
  <div class="bg-gradient-to-br from-green-600 via-green-500 to-green-400 text-white">
    <div class="container mx-auto px-4 py-12 sm:py-16">
      <nav class="flex items-center gap-2 text-sm text-white/70 mb-8">
        <a class="hover:text-white transition-colors duration-200" routerLink="/">Home</a
        ><span class="text-white/40">/</span
        ><span class="text-white font-medium">Privacy Policy</span>
      </nav>
      <div class="flex flex-col sm:flex-row items-start sm:items-center gap-6">
        <div
          class="w-20 h-20 rounded-3xl bg-white/20 backdrop-blur-sm flex items-center justify-center shadow-2xl shadow-primary-900/30 ring-1 ring-white/30"
        >
          <i class="fa-solid fa-shield-halved text-4xl"></i>
        </div>
        <div>
          <h1 class="text-3xl sm:text-4xl lg:text-5xl font-bold tracking-tight">Privacy Policy</h1>
          <p class="text-white/80 mt-2 text-lg">Last updated: February 2026</p>
        </div>
      </div>
    </div>
  </div>
  <div class="container mx-auto px-4 py-12">
    <div
      class="bg-gradient-to-r from-green-50 to-green-100/50 border border-green-200 rounded-3xl p-6 sm:p-8 mb-12 shadow-sm"
    >
      <div class="flex items-start gap-4">
        <div
          class="w-12 h-12 rounded-2xl bg-green-500 flex items-center justify-center flex-shrink-0 shadow-lg shadow-green-500/25"
        >
          <i class="fa-solid fa-shield-halved text-xl text-white"></i>
        </div>
        <div>
          <h2 class="text-lg font-bold text-green-900 mb-2">Your Privacy Matters</h2>
          <p class="text-green-800 leading-relaxed text-lg">
            This Privacy Policy describes how FreshCart collects, uses, and protects your personal
            information when you use our services. We are committed to ensuring that your privacy is
            protected.
          </p>
        </div>
      </div>
    </div>
    <app-privacy-terms-cards [Crads]="privacyPolicyCrads()"></app-privacy-terms-cards>
    <app-privacy-terms-footer
      [link]="'terms'"
      [view]="'Terms of Service'"
    ></app-privacy-terms-footer>
  </div>
</div>
