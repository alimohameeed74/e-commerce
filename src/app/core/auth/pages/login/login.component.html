<div class="container py-10 mx-auto px-4 lg:max-w-175">
  <div class="items-center max-w-7xl mx-auto">
    <div class="w-full">
      <div class="bg-white rounded-2xl border border-gray-300 shadow-xl p-8 lg:p-12">
        <div class="text-center mb-8">
          <div class="flex items-center justify-center mb-4">
            <span class="text-3xl font-bold text-green-600"
              >Fresh<span class="text-gray-800">Cart</span></span
            >
          </div>
          <h1 class="text-3xl font-bold text-gray-800 mb-2">Welcome Back!</h1>
          <p class="text-gray-600">Sign in to continue your fresh shopping experience</p>
        </div>
        <div class="space-y-3 mb-6">
          <button
            type="button"
            class="w-full flex items-center justify-center gap-3 py-3 px-4 border-2 border-gray-200 rounded-xl hover:border-green-300 hover:bg-green-50 transition-all duration-200"
          >
            <i class="fa-brands fa-google me-2 text-red-600"></i
            ><span class="font-medium text-sm sm:text-xl text-gray-700"
              >Continue with Google</span
            ></button
          ><button
            type="button"
            class="w-full flex items-center justify-center gap-3 py-3 px-4 border-2 border-gray-200 rounded-xl hover:border-green-300 hover:bg-green-50 transition-all duration-200"
          >
            <i class="fa-brands fa-facebook me-2 text-blue-600"></i
            ><span class="font-medium text-sm sm:text-xl text-gray-700"
              >Continue with Facebook</span
            >
          </button>
        </div>
        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-white text-gray-500 font-medium">OR CONTINUE WITH EMAIL</span>
          </div>
        </div>
        <form class="space-y-6">
          <div>
            <label for="email" class="block text-sm font-semibold text-gray-700 mb-2"
              >Email Address</label
            >
            <div class="relative">
              <input
                class="w-full px-4 py-3 pl-12 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all"
                placeholder="Enter your email"
                id="email"
                type="email"
                name="email"
              />
              <i
                class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"
              ></i>
            </div>
          </div>
          <div>
            <div class="flex items-center justify-between mb-2">
              <label for="password" class="block text-sm font-semibold text-gray-700"
                >Password</label
              ><a
                class="text-sm text-green-600 hover:text-green-700 cursor-pointer font-medium"
                routerLink="/forget-password"
                >Forgot Password?</a
              >
            </div>
            <div class="relative">
              <input
                id="password"
                class="w-full px-4 py-3 pl-12 pr-12 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all"
                placeholder="Enter your password"
                type="password"
                name="password"
              />
              <i
                class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"
              ></i>

              <button
                type="button"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
              >
                <i
                  class="fa-solid fa-eye absolute right-0 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
                ></i>
              </button>
            </div>
          </div>

          <button
            type="button"
            class="w-full bg-green-600 text-white py-3 px-4 rounded-xl hover:bg-green-700 transition-all duration-200 font-semibold text-lg shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Sign In
          </button>
        </form>
        <div class="text-center mt-8 pt-6 border-t border-gray-100">
          <p class="text-gray-600">
            New to FreshCart?<a
              class="text-green-600 hover:text-green-700 ms-2 font-semibold cursor-pointer"
              routerLink="/register"
              >Create an account</a
            >
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
