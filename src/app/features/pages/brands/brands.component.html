<div class="bg-gray-50/50">
  <div class="bg-linear-to-br from-violet-600 via-violet-500 to-purple-400 text-white">
    <div class="container mx-auto px-4 py-12 sm:py-16">
      <nav class="flex items-center gap-2 text-sm text-white/70 mb-6">
        <a class="hover:text-white transition-colors" routerLink="/">Home</a
        ><span class="text-white/40">/</span><span class="text-white font-medium">Brands</span>
      </nav>
      <div class="flex items-center gap-5">
        <div
          class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center shadow-xl ring-1 ring-white/30"
        >
          <i class="fa-solid fa-tags text-3xl"></i>
        </div>
        <div>
          <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">Top Brands</h1>
          <p class="text-white/80 mt-1">Shop from your favorite brands</p>
        </div>
      </div>
    </div>
  </div>
  <div class="container mx-auto px-4 py-10">
    <div
      [class.hidden]="offline()"
      class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 sm:gap-5"
    >
      @for (brand of brands(); track brand._id) {
        <app-brand-card [brand]="brand"></app-brand-card>
      }
    </div>
    <app-empty-items [class.hidden]="!emptyBrands()" data="Brands"></app-empty-items>
    <app-internet-connection [class.hidden]="!offline()"></app-internet-connection>
  </div>
</div>
