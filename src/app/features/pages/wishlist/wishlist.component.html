<div class="bg-gray-50/50 py-8">
  <div
    class="bg-white border-b border-gray-100"
    [class.hidden]="offline() || isLoading() || !isUserLogged"
  >
    <div [class]="wishlists()?.length === 0 ? 'hidden' : ''" class="container mx-auto px-4 py-8">
      <nav class="flex items-center gap-2 text-sm text-gray-500 mb-4">
        <a class="hover:text-green-600 transition-colors" routerLink="/">Home</a><span>/</span
        ><span class="text-gray-900 font-medium">Wishlist</span>
      </nav>
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-xl bg-red-50 flex items-center justify-center">
            <i class="fa-solid fa-heart text-xl text-red-500"></i>
          </div>
          <div>
            <h1 class="text-2xl font-bold text-gray-900">My Wishlist</h1>
            <p class="text-gray-500 text-sm">{{ wishlistsCount() }} items saved</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="container mx-auto px-4 py-8" [class.hidden]="offline() || isLoading()">
    <div
      [class]="!isUserLogged ? 'hidden' : ''"
      class="bg-white rounded-2xl border border-gray-100 overflow-hidden"
    >
      @if (wishlists()?.length !== 0) {
        <div
          class="hidden md:grid grid-cols-12 gap-4 px-6 py-4 bg-gray-50 border-b border-gray-100 text-sm font-medium text-gray-500"
        >
          <div class="col-span-6">Product</div>
          <div class="col-span-2 text-center">Price</div>
          <div class="col-span-2 text-center">Status</div>
          <div class="col-span-2 text-center">Actions</div>
        </div>
      }
      <div class="divide-y divide-gray-200">
        @for (wishlist of wishlists(); track $index) {
          <app-wishlist-card
            [card]="wishlist"
            (isDeletedFromWishlist)="handleChange()"
          ></app-wishlist-card>
        }
      </div>
    </div>
    <app-empty-cart
      [class.hidden]="!emptyCart() && isUserLogged"
      icon="fa-heart"
      title="wishlist"
    ></app-empty-cart>
    <div
      [class]="wishlists()?.length === 0 || !isUserLogged ? 'hidden' : ''"
      class="mt-8 flex items-center justify-between"
    >
      <a
        class="text-gray-500 hover:text-green-600 text-sm font-medium transition-colors"
        routerLink="/products"
        >← Continue Shopping</a
      >
    </div>
  </div>
  <app-internet-connection [class.hidden]="!offline()"></app-internet-connection>
</div>
