<div class="bg-gradient-to-br from-green-600 via-green-500 to-green-400 text-white">
  <div class="container mx-auto px-4 py-10 sm:py-14">
    <nav class="flex items-center gap-2 text-sm text-white/70 mb-6 flex-wrap">
      <a class="hover:text-white transition-colors" routerLink="/">Home</a
      ><span class="text-white/40">/</span
      ><span class="text-white font-medium">All Categories</span>
    </nav>
    <div class="flex items-center gap-5">
      <div
        class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center shadow-xl ring-1 ring-white/30"
      >
        <i class="fa-solid fa-box-open text-3xl"></i>
      </div>
      <div>
        <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">All Categories</h1>
        <p class="text-white/80 mt-1">Browse our wide range of product categories</p>
      </div>
    </div>
  </div>
</div>

<div class="container mx-auto px-4 py-10 sm:py-14">
  <div class="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
    @for (category of categories(); track $index) {
      <app-category-card-details [category]="category"></app-category-card-details>
    } @empty {
      <app-content-loader
        class="col-span-1 sm:col-span-2 md:col-span-3 lg:col-span-4 2xl:col-span-5"
      ></app-content-loader>
    }
  </div>
</div>
