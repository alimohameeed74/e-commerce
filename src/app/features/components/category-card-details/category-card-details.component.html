<div
  class="group bg-white rounded-2xl border border-gray-100 p-4 sm:p-6 shadow-sm hover:shadow-xl hover:border-green-200 transition-all duration-300 hover:-translate-y-1"
>
  <a [routerLink]="`/categories/${category()._id}`"
    ><div class="aspect-square rounded-xl overflow-hidden bg-gray-50 mb-4">
      <img
        [alt]="category().name"
        class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
        [src]="category().image"
      />
    </div>
    <h3 class="font-bold text-gray-900 text-center group-hover:text-green-600 transition-colors">
      {{ category().name }}
    </h3>
    <div class="flex justify-center mt-2 opacity-0 group-hover:opacity-100 transition-opacity">
      <span class="text-xs text-green-600 flex items-center gap-1"
        >View Subcategories
        <i class="fa-solid fa-arrow-right text-2xs"></i>
      </span></div
  ></a>
</div>
