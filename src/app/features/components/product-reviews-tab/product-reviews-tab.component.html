<div class="space-y-6">
  <div class="flex flex-col md:flex-row gap-8 items-start md:items-center">
    <div class="text-center">
      <div class="text-5xl font-bold text-gray-900 mb-2">{{ productAvgRate() }}</div>
      <div class="text-yellow-400">
        @for (star of stars(); track $index) {
          <i [class]="star"></i>
        }
      </div>
      <p class="text-sm text-gray-500 mt-2">Based on {{ productReviewsCount() }} reviews</p>
    </div>
    <div class="flex-1 w-full">
      @for (item of reviewsObj(); track $index) {
        <div class="flex items-center gap-3 mb-2">
          <span class="text-sm text-gray-600 w-8">{{ item.starNum }} star</span>
          <div class="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
            <div
              class="h-full bg-yellow-400 rounded-full transition-all duration-300"
              [style]="`width: ${item.percent}%`"
            ></div>
          </div>
          <span class="text-sm text-gray-500 w-10">{{ item.percent }}%</span>
        </div>
      } @empty {
        <div class="flex items-center justify-center gap-3 mb-2">No reviews yet</div>
      }
    </div>
  </div>
  <div class="border-t border-gray-200 pt-6">
    <div class="text-center py-8">
      <i class="fa-solid fa-star text-4xl text-gray-300 mb-3"></i>
      <p class="text-gray-500">Customer reviews will be displayed here.</p>
      <button class="mt-4 text-green-600 hover:text-green-700 font-medium">Write a Review</button>
    </div>
  </div>
</div>
