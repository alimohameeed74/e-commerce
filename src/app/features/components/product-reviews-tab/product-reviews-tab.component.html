<div class="space-y-6">
  <div class="flex flex-col md:flex-row gap-8 items-center">
    <div class="text-center">
      <div class="text-5xl font-bold text-gray-900 mb-2">{{ productAvgRate() }}</div>
      <div class="text-yellow-400">
        @for (star of stars(); track $index) {
          <i [class]="star"></i>
        }
      </div>
      <p class="text-sm text-gray-500 mt-2">Based on {{ productReviewsCount() }} reviews</p>
    </div>
    <div class="flex-1 w-full">
      @for (item of reviewsObj(); track $index) {
        <div class="flex items-center gap-3 mb-2">
          <span class="text-sm text-gray-600 w-8">{{ item.starNum }} star</span>
          <div class="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
            <div
              class="h-full bg-yellow-400 rounded-full transition-all duration-300"
              [style]="`width: ${item.percent}%`"
            ></div>
          </div>
          <span class="text-sm text-gray-500 w-10">{{ item.percent }}%</span>
        </div>
      } @empty {
        <div
          class="flex justify-center items-start sm:items-center p-4 mb-4 text-sm text-fg-warning rounded-base bg-warning-soft"
        >
          <svg
            class="w-4 h-4 me-2 shrink-0 mt-0.5 sm:mt-0"
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10 11h2v5m-2 0h4m-2.592-8.5h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
            />
          </svg>
          No reviews yet.
        </div>
      }
    </div>
  </div>
</div>
