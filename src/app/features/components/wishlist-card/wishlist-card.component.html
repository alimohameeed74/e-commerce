<div
  class="grid grid-cols-1 md:grid-cols-12 gap-4 p-4 md:px-6 md:py-5 items-center hover:bg-gray-400/50 transition-colors"
>
  <div class="md:col-span-6 flex items-center gap-4">
    <a
      class="w-20 h-20 rounded-xl bg-gray-50 border border-gray-100 overflow-hidden shrink-0"
      [routerLink]="`/products/${card()._id}`"
      ><img [alt]="card().title" class="w-full h-full object-contain p-2" [src]="card().imageCover"
    /></a>
    <div class="min-w-0">
      <a
        class="font-medium text-gray-900 hover:text-green-600 transition-colors line-clamp-2"
        [routerLink]="`/products/${card()._id}`"
        >{{ card().title }}</a
      >
      <p class="text-sm text-gray-400 mt-1">{{ card().category.name }}</p>
    </div>
  </div>
  <div class="md:col-span-2 flex md:justify-center items-center gap-2">
    <span class="md:hidden text-sm text-gray-500">Price:</span>
    <div class="text-right md:text-center">
      <div [class]="card().priceAfterDiscount ? '' : 'hidden'" class="font-semibold text-gray-900">
        {{ card().priceAfterDiscount }} EGP
      </div>
      <div [class]="card().priceAfterDiscount ? 'line-through' : ''" class="text-sm text-gray-400">
        {{ card().price }} EGP
      </div>
    </div>
  </div>
  <div class="md:col-span-2 flex md:justify-center">
    <span class="md:hidden text-sm text-gray-500 mr-2">Status:</span
    ><span
      class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-green-50 text-green-700"
      ><span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>In Stock</span
    >
  </div>
  <div class="md:col-span-2 flex items-center gap-2 md:justify-center">
    <button
      [disabled]="isLoading_()"
      (click)="addProductToUserCart(card()._id)"
      class="flex-1 md:flex-none inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-md text-sm font-medium transition-all bg-green-600 text-white hover:bg-green-700 disabled:opacity-50"
    >
      <i
        [class]="isLoading_() ? 'fa-spinner fa-spin' : 'fa-cart-shopping'"
        class="fa-solid text-xs"
      ></i>
      <span class="md:hidden lg:inline">Add to Cart</span></button
    ><button
      [disabled]="isLoading()"
      (click)="removeProductFromWishlist(card()._id)"
      class="w-10 h-10 rounded-md border border-gray-200 flex items-center justify-center text-gray-400 hover:text-red-500 hover:border-red-200 hover:bg-red-50 transition-all disabled:opacity-50"
      title="Remove"
    >
      <i [class]="isLoading() ? 'fa-spin fa-spinner' : 'fa-trash'" class="fa-solid text-sm"></i>
    </button>
  </div>
</div>
